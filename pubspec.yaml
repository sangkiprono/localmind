name: local_mind
description: A personalized offline-first reminder application.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.14.1
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  flutter_local_notifications: ^17.1.2
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  get_it: ^7.6.7
  go_router: ^13.2.0
  uuid: ^4.3.3
  intl: ^0.19.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  timezone: ^0.9.3
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  drift_dev: ^2.14.1
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
